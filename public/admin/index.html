<body>
    <!-- LOGIN -->
    <div id="loginPage" class="login-box">
        <h1>Admin UniversalSA</h1>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit" id="loginBtn">Se connecter</button>
            <p id="errorMsg" class="error hidden"></p>
        </form>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardPage" class="dashboard">
        <aside class="sidebar">
            <h2>UniversalSA</h2>
            <nav>
                <a href="#" class="active" onclick="showTab('orders')">Commandes</a>
                <a href="#" onclick="showTab('products')">Produits</a>
            </nav>
            <button class="logout-btn" onclick="logout()">Déconnexion</button>
        </aside>
        <main class="main-content">
            <h1 id="pageTitle">Commandes</h1>
            <div class="stats-grid">
                <div class="stat-card"><h3 id="statOrders">0</h3><p>Commandes</p></div>
                <div class="stat-card"><h3 id="statPending">0</h3><p>En attente</p></div>
                <div class="stat-card"><h3 id="statProducts">0</h3><p>Produits</p></div>
            </div>
            <div id="ordersTab">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Date</th><th>Client</th><th>Tél</th><th>Wilaya</th><th>Produit</th><th>Statut</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="ordersBody"></tbody>
                </table>
            </div>
            <div id="productsTab" class="hidden">
                <table>
                    <thead>
                        <tr><th>Image</th><th>Marque</th><th>Modèle</th><th>Prix</th><th>Statut</th></tr>
                    </thead>
                    <tbody id="productsBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://xkuxlnxovklnkozoisml.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CpAtOIRhPin3rQ4M9xERsw_qtv0spNQ';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Vérifier session au chargement
        checkSession();

        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const { data: userData } = await supabase
                    .from('users').select('role').eq('id', session.user.id).single();
                if (userData?.role === 'admin') {
                    showDashboard();
                }
            }
        }

        // Login
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Connexion...';
            err.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                err.textContent = error.message;
                err.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Se connecter';
                return;
            }

            const { data: userData } = await supabase
                .from('users').select('role').eq('id', data.user.id).single();

            if (userData?.role !== 'admin') {
                await supabase.auth.signOut();
                err.textContent = 'Accès réservé aux administrateurs';
                err.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Se connecter';
                return;
            }

            showDashboard();
        };

        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').style.display = 'flex';
            loadOrders();
            loadStats();
        }

        async function loadOrders() {
            const { data } = await supabase
                .from('orders')
                .select('*, products(name, brand, model, price)')
                .order('created_at', { ascending: false });
            
            const tbody = document.getElementById('ordersBody');
            tbody.innerHTML = (data || []).map(o => {
                const p = o.products || {};
                return `<tr>
                    <td>#${o.id}</td>
                    <td>${new Date(o.created_at).toLocaleDateString('fr-FR')}</td>
                    <td><strong>${o.customer_name}</strong></td>
                    <td>${o.phone}</td>
                    <td>${o.wilaya || '-'}</td>
                    <td>${p.brand || ''} ${p.model || ''}</td>
                    <td>
                        <select onchange="updateStatus(${o.id}, this.value)">
                            <option value="pending" ${o.status==='pending'?'selected':''}>En attente</option>
                            <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmé</option>
                            <option value="delivered" ${o.status==='delivered'?'selected':''}>Livré</option>
                            <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Annulé</option>
                        </select>
                    </td>
                    <td><button class="btn-whatsapp" onclick="window.open('https://wa.me/${o.phone.replace(/\\s/g,'').replace(/^0/,'213')}', '_blank')">WhatsApp</button></td>
                </tr>`;
            }).join('');
        }

        async function updateStatus(id, status) {
            await supabase.from('orders').update({ status }).eq('id', id);
            loadOrders();
            loadStats();
        }

        async function loadStats() {
            const { count: total } = await supabase.from('orders').select('*', { count: 'exact', head: true });
            const { count: pending } = await supabase.from('orders').select('*', { count: 'exact', head: true }).eq('status', 'pending');
            const { count: products } = await supabase.from('products').select('*', { count: 'exact', head: true }).eq('active', true);
            
            document.getElementById('statOrders').textContent = total || 0;
            document.getElementById('statPending').textContent = pending || 0;
            document.getElementById('statProducts').textContent = products || 0;
        }

        async function loadProducts() {
            const { data } = await supabase.from('products').select('*').order('created_at', { ascending: false });
            const tbody = document.getElementById('productsBody');
            tbody.innerHTML = (data || []).map(p => `<tr>
                <td><img src="${p.image_url || '/placeholder.jpg'}" style="width:60px;height:45px;object-fit:cover;border-radius:8px;"></td>
                <td><strong>${p.brand}</strong></td>
                <td>${p.model}</td>
                <td>${p.price?.toLocaleString()} DA</td>
                <td>${p.active ? 'Actif' : 'Inactif'}</td>
            </tr>`).join('');
        }

        function showTab(tab) {
            document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'orders') {
                document.getElementById('ordersTab').classList.remove('hidden');
                document.getElementById('productsTab').classList.add('hidden');
                document.getElementById('pageTitle').textContent = 'Commandes';
                loadOrders();
            } else {
                document.getElementById('ordersTab').classList.add('hidden');
                document.getElementById('productsTab').classList.remove('hidden');
                document.getElementById('pageTitle').textContent = 'Produits';
                loadProducts();
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }
    </script>
